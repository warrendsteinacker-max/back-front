<body>

    <h1>Local Item Tracker</h1>
    
    <div id="network-status">Network Status Unknown. Tap Test Connection below to ping PC.</div>

    <div class="container" style="border-top: 4px solid #ffc107;">
        <h2>0. Network Testing Panel</h2>
        <p style="font-size: 0.85rem; color:#666; margin: 0;">Tap this to verify if your phone's Wi-Fi packets are successfully reaching your computer's node environment backend.</p>
        <button class="test-btn" onclick="runConnectionPingTest()">⚡ Run Network Connection Test</button>
    </div>

    <div class="container">
        <h2>1. Scanner</h2>
        <div id="reader" class="hidden"></div>
        <button id="scan-btn" onclick="toggleScanner()">Start Scanner (Single Scan Mode)</button>

        <div id="action-box" class="modal-action-box hidden">
            <h3>Scanned Barcode: <span id="scanned-code-text" style="color:#007bff;"></span></h3>
            <label for="item-name">Item Identity Name:</label>
            <input type="text" id="item-name" placeholder="e.g., Planters Peanuts 16oz">
            
            <div class="flex-buttons">
                <button class="secondary" onclick="saveScannedItem('inventory')">Add to Master Inventory</button>
                <button style="background-color: #6f42c1;" onclick="saveScannedItem('purchased')">Log Direct to Purchased</button>
            </div>
        </div>
    </div>

    <div class="container" style="border-left: 5px solid #6c757d;">
        <h2>2. Manual Selection Logging</h2>
        <p style="font-size: 0.9rem; color:#666; margin: 0 0 10px 0;">Select an item from your local Master Inventory dictionary to record a purchase instantly.</p>
        <label for="quick-inventory-select">Choose Item from Inventory:</label>
        <select id="quick-inventory-select">
            <option value="">-- No items available --</option>
        </select>
        <button class="secondary" onclick="purchaseFromSelect()">Log Selected Item as Purchased</button>
    </div>

    <div class="container search-box">
        <h2>3. Master Inventory Search</h2>
        <input type="text" id="search-input" onkeyup="renderLists()" placeholder="Type a name or scan-code to filter lists instantly...">
        
        <h3>Local Inventory List</h3>
        <ul id="inventory-ui-list" class="item-list"></ul>
    </div>

    <div class="container" style="border-left: 5px solid #6f42c1;">
        <h2>4. Purchased Log</h2>
        <ul id="purchased-ui-list" class="item-list"></ul>
    </div>

    <script>
        let inventoryItems = JSON.parse(localStorage.getItem('inventoryItems')) || [];
        let purchasedLog = JSON.parse(localStorage.getItem('purchasedLog')) || [];
        
        let html5QrcodeScanner = null;
        let currentScannedBarcode = "";

        // Standalone Diagnostic Ping Execution Loop
        async function runConnectionPingTest() {
            const statusEl = document.getElementById('network-status');
            statusEl.innerText = "Sending test ping payload down network link...";
            statusEl.style.backgroundColor = "#fff3cd";
            statusEl.style.color = "#856404";
            
            const startTime = Date.now();
            try {
                // Pinpoints the absolute host address path serving this file automatically
                const response = await fetch('/api/ping');
                if (response.ok) {
                    const duration = Date.now() - startTime;
                    statusEl.innerText = `✅ CONNECTION SOLID! PC responded in ${duration}ms. Data will log perfectly.`;
                    statusEl.style.backgroundColor = "#d4edda";
                    statusEl.style.color = "#155724";
                    statusEl.style.border = "1px solid #c3e6cb";
                } else {
                    throw new Error("Server hit but responded with bad context status code.");
                }
            } catch (err) {
                statusEl.innerText = "❌ PIPELINE FAILED: The packet was swallowed or dropped. Check Windows Firewall or turn off Cellular Data.";
                statusEl.style.backgroundColor = "#f8d7da";
                statusEl.style.color = "#721c24";
                statusEl.style.border = "1px solid #f5c6cb";
                console.error("Diagnostic Ping Error:", err);
            }
        }

        async function syncWithLocalServer(actionType, itemPayload) {
            try {
                await fetch('/api/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: actionType, item: itemPayload })
                });
            } catch (err) {
                console.error("Local sync transaction failed:", err);
            }
        }

        function toggleScanner() {
            const readerDiv = document.getElementById('reader');
            const scanBtn = document.getElementById('scan-btn');

            if (html5QrcodeScanner === null) {
                readerDiv.classList.remove('hidden');
                scanBtn.innerText = "Stop Scanner";

                html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                    fps: 10, 
                    qrbox: { width: 260, height: 160 },
                    rememberLastUsedCamera: true
                }, false);

                html5QrcodeScanner.render(onScanSuccess, onScanFailure);
            } else {
                stopScanner();
            }
        }

        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().then(() => {
                    html5QrcodeScanner = null;
                    document.getElementById('reader').classList.add('hidden');
                    document.getElementById('scan-btn').innerText = "Start Scanner (Single Scan Mode)";
                }).catch(err => console.error("Scanner tracking error: ", err));
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            stopScanner();
            currentScannedBarcode = decodedText;
            document.getElementById('scanned-code-text').innerText = decodedText;
            
            const matchedLocalItem = inventoryItems.find(item => item.barcode === decodedText) || 
                                     purchasedLog.find(item => item.barcode === decodedText);
            
            document.getElementById('item-name').value = matchedLocalItem ? matchedLocalItem.name : "";
            document.getElementById('action-box').classList.remove('hidden');
        }

        function onScanFailure(error) {}

        function saveScannedItem(targetList) {
            const nameInput = document.getElementById('item-name').value.trim();
            const finalName = nameInput || `Barcode item ${currentScannedBarcode}`;
            const barcodeExists = inventoryItems.some(item => item.barcode === currentScannedBarcode);

            const itemPayload = {
                id: Date.now().toString(),
                barcode: currentScannedBarcode,
                name: finalName,
                timestamp: new Date().toLocaleString()
            };

            if (targetList === 'inventory') {
                if (!barcodeExists) {
                    inventoryItems.unshift(itemPayload);
                } else {
                    inventoryItems = inventoryItems.map(item => 
                        item.barcode === currentScannedBarcode ? { ...item, name: finalName } : item
                    );
                }
                localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
                syncWithLocalServer("ADD_TO_INVENTORY", itemPayload);
            } else if (targetList === 'purchased') {
                purchasedLog.unshift(itemPayload);
                localStorage.setItem('purchasedLog', JSON.stringify(purchasedLog));

                if (!barcodeExists) {
                    inventoryItems.unshift({
                        id: 'inv_' + Date.now().toString(),
                        barcode: currentScannedBarcode,
                        name: finalName,
                        timestamp: new Date().toLocaleString()
                    });
                    localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
                }
                syncWithLocalServer("LOG_PURCHASE", itemPayload);
            }

            document.getElementById('action-box').classList.add('hidden');
            currentScannedBarcode = "";
            document.getElementById('item-name').value = "";
            renderLists();
        }

        function purchaseFromSelect() {
            const selectEl = document.getElementById('quick-inventory-select');
            const selectedId = selectEl.value;
            if (!selectedId) return;

            const baseTemplate = inventoryItems.find(item => item.id === selectedId);
            if (baseTemplate) {
                const logEntry = {
                    id: Date.now().toString(),
                    barcode: baseTemplate.barcode,
                    name: baseTemplate.name,
                    timestamp: new Date().toLocaleString()
                };
                
                purchasedLog.unshift(logEntry);
                localStorage.setItem('purchasedLog', JSON.stringify(purchasedLog));
                renderLists();
                syncWithLocalServer("MANUAL_SELECT_PURCHASE", logEntry);
            }
        }

        function deleteItem(id, listType) {
            if (listType === 'inventory') {
                inventoryItems = inventoryItems.filter(item => item.id !== id);
                localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
            } else {
                purchasedLog = purchasedLog.filter(item => item.id !== id);
                localStorage.setItem('purchasedLog', JSON.stringify(purchasedLog));
            }
            renderLists();
        }

        function renderLists() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            const inventoryUI = document.getElementById('inventory-ui-list');
            const purchasedUI = document.getElementById('purchased-ui-list');
            const selectUI = document.getElementById('quick-inventory-select');

            inventoryUI.innerHTML = "";
            const filteredInventory = inventoryItems.filter(item => 
                item.name.toLowerCase().includes(searchQuery) || item.barcode.includes(searchQuery)
            );

            if (filteredInventory.length === 0) {
                inventoryUI.innerHTML = `<li style="color:#888; font-size:0.9rem; padding: 5px;">No items match criteria.</li>`;
            } else {
                filteredInventory.forEach(item => {
                    inventoryUI.innerHTML += `
                        <li class="item-card">
                            <div>
                                <strong>${item.name}</strong><br>
                                <span style="font-size:0.8rem; color:#666;">Code: ${item.barcode}</span>
                            </div>
                            <button class="danger" onclick="deleteItem('${item.id}', 'inventory')">Remove</button>
                        </li>`;
                });
            }

            purchasedUI.innerHTML = "";
            const filteredPurchases = purchasedLog.filter(item => 
                item.name.toLowerCase().includes(searchQuery) || item.barcode.includes(searchQuery)
            );

            if (filteredPurchases.length === 0) {
                purchasedUI.innerHTML = `<li style="color:#888; font-size:0.9rem; padding: 5px;">No matching records found.</li>`;
            } else {
                filteredPurchases.forEach(item => {
                    purchasedUI.innerHTML += `
                        <li class="item-card" style="border-left: 4px solid #6f42c1;">
                            <div>
                                <strong>${item.name}</strong><br>
                                <span style="font-size:0.75rem; color:#888;">Logged: ${item.timestamp}</span>
                            </div>
                            <button class="danger" onclick="deleteItem('${item.id}', 'purchased')">Delete</button>
                        </li>`;
                });
            }

            selectUI.innerHTML = inventoryItems.length === 0 
                ? `<option value="">-- No registered inventory items --</option>`
                : inventoryItems.map(item => `<option value="${item.id}">${item.name} (${item.barcode})</option>`).join('');
        }

        document.addEventListener("DOMContentLoaded", renderLists);
    </script>
</body>
</html> -->

    #req-log { background: #1e1e1e; color: #9cdcfe; font-family: monospace; font-size: 0.72rem; padding: 10px; border-radius: 5px; max-height: 180px; overflow-y: auto; white-space: pre-wrap; margin-top: 10px; }
    .t-teal   { border-left: 5px solid #17a2b8; }

<body>

<h1>📦 Item Tracker</h1>
<div id="status">Tap ⚡ Test Connection to verify server link.</div>

<!-- 0. NETWORK TEST -->
<div class="card t-yellow">
  <h2>0. Network Test</h2>
  <button class="yellow" onclick="pingTest()">⚡ Test Connection to Server</button>
</div>

<!-- 1. SCANNER -->
<div class="card">
  <h2>1. Barcode Scanner</h2>
  <div id="reader" class="hidden"></div>

  <button id="scan-btn" onclick="toggleScanner()">▶ Start Scanner</button>

  <!-- camera selector — shown only when scanner is active -->
  <div id="cam-controls" class="cam-toggle hidden">
    <button id="btn-back"  onclick="switchCamera('environment')" class="cam-active">🔙 Back Camera</button>
    <button id="btn-front" onclick="switchCamera('user')">🤳 Front Camera</button>
  </div>

  <div id="action-box" class="action-box hidden">
    <strong>Scanned: <span id="scanned-code" style="color:#007bff"></span></strong>
    <input type="text" id="item-name" placeholder="Item name (e.g. Planters Peanuts 16oz)">
    <div class="row">
      <button class="green"  onclick="saveItem('inventory')">Add to Inventory</button>
      <button class="purple" onclick="saveItem('purchase')">Log as Purchase</button>
    </div>
  </div>
</div>

<!-- 2. QUICK PURCHASE -->
<div class="card t-gray">
  <h2>2. Quick Purchase</h2>
  <select id="quick-select"><option value="">-- Select inventory item --</option></select>
  <button class="green" onclick="quickPurchase()">Log as Purchase</button>
</div>

<!-- 3. INVENTORY -->
<div class="card t-teal">
  <h2>3. Inventory</h2>
  <input type="text" id="search" oninput="renderAll()" placeholder="Search name or barcode...">
  <ul id="inv-list"></ul>
</div>

<!-- 4. PURCHASES -->
<div class="card t-purple">
  <h2>4. Purchase Log</h2>
  <ul id="pur-list"></ul>
</div>

<!-- 5. SCAN HISTORY -->
<div class="card" style="border-left:5px solid #fd7e14">
  <h2>5. Scan History</h2>
  <ul id="scan-list"></ul>
  <button class="gray" style="margin-top:10px" onclick="clearScans()">🗑 Clear Scan History</button>
</div>

<!-- 6. REQUEST LOG + DB -->
<div class="card" style="border-left:5px solid #17a2b8">
  <h2>6. Frontend Request Log</h2>
  <div id="req-log">Waiting for requests...</div>
  <button class="gray" onclick="loadFromServer()">🔄 Refresh DB from Server</button>
  <button class="red"  style="width:100%;margin-top:6px" onclick="clearDB()">🧹 Clear Entire DB</button>
</div>

<script>
  // ── STATE ────────────────────────────────────────────────
  let inventory = [], purchases = [], scans = [];
  let scanner   = null;
  let currentBarcode = '';
  let currentCamera  = 'environment'; // 'environment' = back, 'user' = front
  let reqLogLines    = [];

  // ── STATUS BAR ───────────────────────────────────────────
  function setStatus(msg, type = 'neutral') {
    const el = document.getElementById('status');
    el.innerText = msg;
    const c = { ok: ['#d4edda','#155724','#c3e6cb'], error: ['#f8d7da','#721c24','#f5c6cb'], loading: ['#fff3cd','#856404','#ffeeba'], neutral: ['#e2e3e5','#383d41','#d6d8db'] };
    const [bg, color, border] = c[type] || c.neutral;
    Object.assign(el.style, { background: bg, color, border: `1px solid ${border}` });
  }

  // ── REQUEST LOG (frontend side) ──────────────────────────
  function logReq(method, url, status, detail = '') {
    const t   = new Date().toLocaleTimeString();
    const line = `[${t}] ${method} ${url} → ${status}${detail ? '  ' + detail : ''}`;
    reqLogLines.unshift(line);
    if (reqLogLines.length > 60) reqLogLines.pop();
    document.getElementById('req-log').textContent = reqLogLines.join('\n');
  }

  // ── API HELPER ───────────────────────────────────────────
  async function api(method, url, body) {
    const opts = { method, headers: {} };
    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    try {
      const res  = await fetch(url, opts);
      const data = await res.json();
      logReq(method, url, res.status, body ? JSON.stringify(body).slice(0, 60) : '');
      return { ok: res.ok, status: res.status, data };
    } catch (e) {
      logReq(method, url, 'FAILED', e.message);
      throw e;
    }
  }

  // ── PING ─────────────────────────────────────────────────
  async function pingTest() {
    setStatus('Pinging...', 'loading');
    const t = Date.now();
    try {
      const r = await api('GET', '/api/ping');
      setStatus(`✅ Connected in ${Date.now()-t}ms — camera ready`, 'ok');
      await loadFromServer();
    } catch {
      setStatus('❌ Failed — same Wi-Fi? Cellular off? Firewall open?', 'error');
    }
  }

  // ── LOAD ALL DATA ────────────────────────────────────────
  async function loadFromServer() {
    try {
      const r = await api('GET', '/api/db');
      inventory = r.data.inventory || [];
      purchases = r.data.purchases || [];
      scans     = r.data.scans     || [];
      renderAll();
    } catch(e) { console.error('loadFromServer failed:', e); }
  }

  // ── SCANNER ──────────────────────────────────────────────
  function toggleScanner() {
    if (!scanner) startScanner(currentCamera);
    else          stopScanner();
  }

  function startScanner(facingMode) {
    const reader = document.getElementById('reader');
    const btn    = document.getElementById('scan-btn');
    const cams   = document.getElementById('cam-controls');

    reader.classList.remove('hidden');
    cams.classList.remove('hidden');
    btn.innerText = '⏹ Stop Scanner';

    scanner = new Html5QrcodeScanner('reader', {
      fps: 10,
      qrbox: { width: 260, height: 160 },
      facingMode                           // 'environment' or 'user'
    }, false);
    scanner.render(onScanSuccess, () => {});

    // highlight active camera button
    document.getElementById('btn-back').classList.toggle('cam-active',  facingMode === 'environment');
    document.getElementById('btn-front').classList.toggle('cam-active', facingMode === 'user');
  }

  function stopScanner() {
    if (!scanner) return;
    scanner.clear().catch(() => {});
    scanner = null;
    document.getElementById('reader').classList.add('hidden');
    document.getElementById('cam-controls').classList.add('hidden');
    document.getElementById('scan-btn').innerText = '▶ Start Scanner';
  }

  function switchCamera(facingMode) {
    currentCamera = facingMode;
    stopScanner();
    setTimeout(() => startScanner(facingMode), 300); // brief pause lets camera release
  }

  async function onScanSuccess(code) {
    stopScanner();
    currentBarcode = code;
    document.getElementById('scanned-code').innerText = code;

    // POST raw scan event to server with camera info
    await api('POST', '/api/scans', {
      barcode: code,
      camera:  currentCamera === 'environment' ? 'back' : 'front',
      device:  navigator.userAgent.slice(0, 80)
    });

    // auto-fill name if already known
    const match = inventory.find(i => i.barcode === code);
    document.getElementById('item-name').value = match ? match.name : '';
    document.getElementById('action-box').classList.remove('hidden');
    await loadFromServer();
  }

  // ── SAVE FROM SCANNER ACTION BOX ────────────────────────
  async function saveItem(target) {
    const name = document.getElementById('item-name').value.trim() || `Item ${currentBarcode}`;
    setStatus('Saving...', 'loading');
    try {
      if (target === 'inventory') {
        await api('POST', '/api/inventory', { barcode: currentBarcode, name });
        setStatus(`✅ "${name}" saved to inventory`, 'ok');
      } else {
        await api('POST', '/api/purchases', { barcode: currentBarcode, name });
        setStatus(`✅ "${name}" logged as purchase`, 'ok');
      }
      document.getElementById('action-box').classList.add('hidden');
      document.getElementById('item-name').value = '';
      currentBarcode = '';
      await loadFromServer();
    } catch { setStatus('❌ Save failed — is server running?', 'error'); }
  }

  // ── QUICK PURCHASE ───────────────────────────────────────
  async function quickPurchase() {
    const sel  = document.getElementById('quick-select');
    const item = inventory.find(i => i.id === sel.value);
    if (!item) return;
    setStatus('Logging...', 'loading');
    try {
      await api('POST', '/api/purchases', { barcode: item.barcode, name: item.name });
      setStatus(`✅ "${item.name}" logged as purchase`, 'ok');
      await loadFromServer();
    } catch { setStatus('❌ Failed', 'error'); }
  }

  // ── DELETE HELPERS ───────────────────────────────────────
  async function deleteItem(id, type) {
    const url = type === 'inventory' ? `/api/inventory/${id}` : `/api/purchases/${id}`;
    try { await api('DELETE', url); await loadFromServer(); }
    catch { setStatus('❌ Delete failed', 'error'); }
  }

  async function clearScans() {
    await api('DELETE', '/api/scans');
    await loadFromServer();
  }

  async function clearDB() {
    if (!confirm('Clear the entire server database?')) return;
    await api('DELETE', '/api/db');
    await loadFromServer();
    setStatus('🧹 Database cleared', 'neutral');
  }

  // ── RENDER ───────────────────────────────────────────────
  function renderAll() {
    const q = (document.getElementById('search').value || '').toLowerCase();

    // inventory list
    const filtInv = inventory.filter(i => i.name.toLowerCase().includes(q) || i.barcode.includes(q));
    document.getElementById('inv-list').innerHTML = filtInv.length === 0
      ? '<li style="color:#888;padding:5px;font-size:0.85rem">No items.</li>'
      : filtInv.map(i => `
          <li class="item-card">
            <div><strong>${i.name}</strong><small>Barcode: ${i.barcode}</small></div>
            <button class="red" onclick="deleteItem('${i.id}','inventory')">Remove</button>
          </li>`).join('');

    // purchases list
    const filtPur = purchases.filter(i => i.name.toLowerCase().includes(q) || i.barcode.includes(q));
    document.getElementById('pur-list').innerHTML = filtPur.length === 0
      ? '<li style="color:#888;padding:5px;font-size:0.85rem">No purchases.</li>'
      : filtPur.map(p => `
          <li class="item-card" style="border-left:4px solid #6f42c1">
            <div><strong>${p.name}</strong><small>${new Date(p.loggedAt).toLocaleString()}</small></div>
            <button class="red" onclick="deleteItem('${p.id}','purchase')">Delete</button>
          </li>`).join('');

    // scan history
    document.getElementById('scan-list').innerHTML = scans.length === 0
      ? '<li style="color:#888;padding:5px;font-size:0.85rem">No scans yet.</li>'
      : scans.map(s => `
          <li class="item-card" style="border-left:4px solid #fd7e14">
            <div><strong>${s.barcode}</strong><small>${s.camera} camera · ${new Date(s.scannedAt).toLocaleString()}</small></div>
          </li>`).join('');

    // quick-select dropdown
    document.getElementById('quick-select').innerHTML = inventory.length === 0
      ? '<option value="">-- No inventory items --</option>'
      : inventory.map(i => `<option value="${i.id}">${i.name} (${i.barcode})</option>`).join('');
  }

  // ── INIT ─────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => loadFromServer().catch(() => {}));
</script>
</body>
</html>

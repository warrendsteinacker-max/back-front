    <h1>Local Item Tracker</h1>
    
    <div id="network-status">Network Status Unknown. Tap Test Connection below to ping PC.</div>

        let inventoryItems = JSON.parse(localStorage.getItem('inventoryItems')) || [];
        let purchasedLog = JSON.parse(localStorage.getItem('purchasedLog')) || [];
        
        let html5QrcodeScanner = null;
        let currentScannedBarcode = "";

        // Standalone Diagnostic Ping Execution Loop
        async function runConnectionPingTest() {
            const statusEl = document.getElementById('network-status');
            statusEl.innerText = "Sending test ping payload down network link...";
            statusEl.style.backgroundColor = "#fff3cd";
            statusEl.style.color = "#856404";
            
            const startTime = Date.now();
            try {
                // Pinpoints the absolute host address path serving this file automatically
                const response = await fetch('/api/ping');
                if (response.ok) {
                    const duration = Date.now() - startTime;
                    statusEl.innerText = `✅ CONNECTION SOLID! PC responded in ${duration}ms. Data will log perfectly.`;
                    statusEl.style.backgroundColor = "#d4edda";
                    statusEl.style.color = "#155724";

                statusEl.style.color = "#721c24";

                stopScanner();

                    html5QrcodeScanner = null;
                    document.getElementById('reader').classList.add('hidden');
                    document.getElementById('scan-btn').innerText = "Start Scanner (Single Scan Mode)";

        function onScanSuccess(decodedText, decodedResult) {
            stopScanner();
            currentScannedBarcode = decodedText;
            document.getElementById('scanned-code-text').innerText = decodedText;
            
            const matchedLocalItem = inventoryItems.find(item => item.barcode === decodedText) || 
                                     purchasedLog.find(item => item.barcode === decodedText);
            
            document.getElementById('item-name').value = matchedLocalItem ? matchedLocalItem.name : "";
            document.getElementById('action-box').classList.remove('hidden');

        function onScanFailure(error) {}

        function saveScannedItem(targetList) {
            const nameInput = document.getElementById('item-name').value.trim();
            const finalName = nameInput || `Barcode item ${currentScannedBarcode}`;
            const barcodeExists = inventoryItems.some(item => item.barcode === currentScannedBarcode);

            const itemPayload = {
                id: Date.now().toString(),
                barcode: currentScannedBarcode,
                name: finalName,
                timestamp: new Date().toLocaleString()
            };

            if (targetList === 'inventory') {
                if (!barcodeExists) {
                    inventoryItems.unshift(itemPayload);
                } else {
                    inventoryItems = inventoryItems.map(item => 
                        item.barcode === currentScannedBarcode ? { ...item, name: finalName } : item
                    );

                localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
                syncWithLocalServer("ADD_TO_INVENTORY", itemPayload);
            } else if (targetList === 'purchased') {
                purchasedLog.unshift(itemPayload);
                localStorage.setItem('purchasedLog', JSON.stringify(purchasedLog));

                if (!barcodeExists) {
                    inventoryItems.unshift({
                        id: 'inv_' + Date.now().toString(),
                        barcode: currentScannedBarcode,
                        name: finalName,
                        timestamp: new Date().toLocaleString()
                    });
                    localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
                }
                syncWithLocalServer("LOG_PURCHASE", itemPayload);
            }

            document.getElementById('action-box').classList.add('hidden');
            currentScannedBarcode = "";
            document.getElementById('item-name').value = "";
            renderLists();
        }

        function purchaseFromSelect() {
            const selectEl = document.getElementById('quick-inventory-select');
            const selectedId = selectEl.value;
            if (!selectedId) return;

            const baseTemplate = inventoryItems.find(item => item.id === selectedId);
            if (baseTemplate) {
                const logEntry = {
                    id: Date.now().toString(),
                    barcode: baseTemplate.barcode,
                    name: baseTemplate.name,
                    timestamp: new Date().toLocaleString()
                };
                
                purchasedLog.unshift(logEntry);
                localStorage.setItem('purchasedLog', JSON.stringify(purchasedLog));
                renderLists();
                syncWithLocalServer("MANUAL_SELECT_PURCHASE", logEntry);
            }
        }

        function deleteItem(id, listType) {
            if (listType === 'inventory') {
                inventoryItems = inventoryItems.filter(item => item.id !== id);
                localStorage.setItem('inventoryItems', JSON.stringify(inventoryItems));
            } else {
                purchasedLog = purchasedLog.filter(item => item.id !== id);
                localStorage.setItem('purchasedLog', JSON.stringify(purchasedLog));
            }
            renderLists();
        }

        function renderLists() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            const inventoryUI = document.getElementById('inventory-ui-list');
            const purchasedUI = document.getElementById('purchased-ui-list');
            const selectUI = document.getElementById('quick-inventory-select');

            inventoryUI.innerHTML = "";
            const filteredInventory = inventoryItems.filter(item => 
                item.name.toLowerCase().includes(searchQuery) || item.barcode.includes(searchQuery)
            );

            if (filteredInventory.length === 0) {
                inventoryUI.innerHTML = `<li style="color:#888; font-size:0.9rem; padding: 5px;">No items match criteria.</li>`;
            } else {
                filteredInventory.forEach(item => {
                    inventoryUI.innerHTML += `
                        <li class="item-card">
                            <div>
                                <strong>${item.name}</strong><br>
                                <span style="font-size:0.8rem; color:#666;">Code: ${item.barcode}</span>
                            </div>
                            <button class="danger" onclick="deleteItem('${item.id}', 'inventory')">Remove</button>
                        </li>`;
                });
            }

            purchasedUI.innerHTML = "";
            const filteredPurchases = purchasedLog.filter(item => 
                item.name.toLowerCase().includes(searchQuery) || item.barcode.includes(searchQuery)
            );

            if (filteredPurchases.length === 0) {
                purchasedUI.innerHTML = `<li style="color:#888; font-size:0.9rem; padding: 5px;">No matching records found.</li>`;
            } else {
                filteredPurchases.forEach(item => {
                    purchasedUI.innerHTML += `
                        <li class="item-card" style="border-left: 4px solid #6f42c1;">
                            <div>
                                <strong>${item.name}</strong><br>
                                <span style="font-size:0.75rem; color:#888;">Logged: ${item.timestamp}</span>
                            </div>
                            <button class="danger" onclick="deleteItem('${item.id}', 'purchased')">Delete</button>
                        </li>`;
                });
            }

            selectUI.innerHTML = inventoryItems.length === 0 
                ? `<option value="">-- No registered inventory items --</option>`
                : inventoryItems.map(item => `<option value="${item.id}">${item.name} (${item.barcode})</option>`).join('');
        }

        document.addEventListener("DOMContentLoaded", renderLists);
    </script>
</body>

    <script>
        // Server routing base context config (Relative routes work automatically since it serves this file)
        const API_BASE = window.location.origin;

        // Global arrays synced directly from database streams

        let purchasedLog = [];
        
        let html5Qrcode = null; 
        let scannerRunning = false;
        let currentCamera = 'environment'; 
        let lastScannedBarcode = "";
        let scanThrottleTimeout = null;

        // --- FETCH SYNC PIPELINES FROM EXPRESS BACKEND ---
        async function loadDataFromBackend() {
            try {
                // Confirm server operational ping status
                const pingRes = await fetch(`${API_BASE}/api/ping`);
                if (pingRes.ok) {
                    const pingData = await pingRes.json();
                    document.getElementById('api-status').innerHTML = `✅ Connected to <b>${pingData.ip}:${pingData.port}</b> via HTTPS. System Armed.`;
                    document.getElementById('api-status').style.backgroundColor = "#d4edda";
                    document.getElementById('api-status').style.color = "#155724";
                }

                // Hydrate live inventory array
                const invRes = await fetch(`${API_BASE}/api/inventory`);
                if (invRes.ok) inventoryItems = await invRes.json();

                // Hydrate live purchase log array
                const purRes = await fetch(`${API_BASE}/api/purchases`);
                if (purRes.ok) purchasedLog = await purRes.json();

                renderLists();
            } catch (err) {
                console.error("Database initialization connection failure: ", err);
                document.getElementById('api-status').innerText = "❌ Connection Failed. Check server log outputs.";
                document.getElementById('api-status').style.backgroundColor = "#f8d7da";
                document.getElementById('api-status').style.color = "#721c24";
            }
        }

        // --- CAMERA SELECT ROTATOR ---
        async function selectCamera(facingMode) {
            if (currentCamera === facingMode) return;
            
            currentCamera = facingMode;
            document.getElementById('btn-front').classList.toggle('cam-active', facingMode === 'user');
            document.getElementById('btn-back').classList.toggle('cam-active', facingMode === 'environment');

            if (scannerRunning) {
                await stopScannerInternal();
                startScannerInternal();
            }
        }

        // --- SCANNER MECHANICS ENGINE ---
        async function toggleScanner() {
            if (scannerRunning) {
                await stopScannerInternal();
            } else {
                startScannerInternal();
            }
        }

        function startScannerInternal() {
            const containerDiv = document.getElementById('reader-container');
            const scanBtn = document.getElementById('scan-btn');

            containerDiv.classList.remove('hidden');
            scanBtn.innerText = "Stop Scanner Process";
            scanBtn.style.backgroundColor = "#6c757d";
            scannerRunning = true;

            html5Qrcode = new Html5Qrcode("reader");

            const config = { 
                fps: 15, 
                qrbox: { width: 260, height: 160 }
            };

            html5Qrcode.start(
                { facingMode: currentCamera }, 
                config, 
                onScanSuccess, 
                onScanFailure
            ).catch(err => {
                console.error("Camera thread access error: ", err);
                stopScannerInternal();
            });
        }

        async function stopScannerInternal() {
            if (!html5Qrcode) {
                scannerRunning = false;
                return;
            }

            try {
                if (html5Qrcode.isScanning) {
                    await html5Qrcode.stop();
                }
            } catch (err) {
                console.error("Video breakdown tracking error: ", err);
            } finally {
                html5Qrcode = null;
                scannerRunning = false;
                document.getElementById('reader-container').classList.add('hidden');
                const scanBtn = document.getElementById('scan-btn');
                scanBtn.innerText = "Start Scanner (Continuous Auto-Send)";
                scanBtn.style.backgroundColor = "#007bff";
            }
        }

        // --- AUTOMATED BACKGROUND TRANSMISSION LOOP ---
        async function onScanSuccess(decodedText, decodedResult) {
            // Anti-bounce filter: Avoid double hitting the same item code multiple times within 3 seconds
            if (lastScannedBarcode === decodedText) return;
            
            lastScannedBarcode = decodedText;
            clearTimeout(scanThrottleTimeout);
            scanThrottleTimeout = setTimeout(() => { lastScannedBarcode = ""; }, 3000);

            // Audio-visual confirmation alerts directly onto screen button canvas layout
            const scanBtn = document.getElementById('scan-btn');
            const originalColor = scanBtn.style.backgroundColor;
            scanBtn.innerText = `⚡ Auto-Transmitting: ${decodedText}`;
            scanBtn.style.backgroundColor = "#28a745";

            // Local lookup to check if a specific structural name template has been initialized
            const knownMatch = inventoryItems.find(i => i.barcode === decodedText);
            const itemName = knownMatch ? knownMatch.name : `Barcode item ${decodedText}`;

            // Build payloads tracking data matches
            const purchasePayload = { barcode: decodedText, name: itemName };
            const scanPayload = { 
                barcode: decodedText, 
                camera: currentCamera === 'environment' ? 'back' : 'front',
                device: navigator.userAgent
            };

            try {
                // 1. Post to Scans route endpoint
                await fetch(`${API_BASE}/api/scans`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(scanPayload)
                });

                // 2. Post to Purchases route endpoint 
                const purResponse = await fetch(`${API_BASE}/api/purchases`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(purchasePayload)
                });

                if (purResponse.ok) {
                    console.log(`[AUTO-TRANSMIT] Successfully processed item: ${decodedText}`);
                    // Pull updated definitions instantly from memory tables
                    await loadDataFromBackend();
                }
            } catch (err) {
                console.error("Background asynchronous request transmission crash: ", err);
                scanBtn.innerText = "🚨 Transmission Connection Error!";
                scanBtn.style.backgroundColor = "#dc3545";
            } finally {
                // Reset display styles back gracefully without breaking stream channel tracking loops
                setTimeout(() => {
                    if (scannerRunning && scanBtn) {
                        scanBtn.innerText = "Stop Scanner Process";
                        scanBtn.style.backgroundColor = "#6c757d";
                    }
                }, 1500);
            }
        }

        function onScanFailure(error) { /* Inline loop noise capture bypass */ }

        // --- QUICK SELECT DIRECT ROUTER ---
        async function purchaseFromSelect() {
            const selectEl = document.getElementById('quick-inventory-select');
            const selectedId = selectEl.value;
            if (!selectedId) return;

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ barcode: baseTemplate.barcode, name: baseTemplate.name })
                });

                if (response.ok) {
                    await loadDataFromBackend();
                }
            } catch (err) {
                console.error("Manual selection request logging failure: ", err);
            }
        }

        // --- BACKEND DELETION COMMAND HANDLERS ---
        async function deleteItem(id, listType) {
            const endpoint = listType === 'inventory' ? `/api/inventory/${id}` : `/api/purchases/${id}`;
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, { method: 'DELETE' });
                if (response.ok) {
                    await loadDataFromBackend();
                }
            } catch (err) {
                console.error("Record target erasure crash: ", err);

        }

        // --- ASYNC RUNTIME RENDERING ---
        function renderLists() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            
            const inventoryUI = document.getElementById('inventory-ui-list');
            const purchasedUI = document.getElementById('purchased-ui-list');
            const selectUI = document.getElementById('quick-inventory-select');

            // 1. Process Master Inventory List
            inventoryUI.innerHTML = "";
            const filteredInventory = inventoryItems.filter(item => 
                item.name.toLowerCase().includes(searchQuery) || item.barcode.includes(searchQuery)
            );

            if (filteredInventory.length === 0) {
                inventoryUI.innerHTML = `<li style="color:#888; font-size:0.9rem; padding: 5px;">No inventory definitions loaded.</li>`;
            } else {
                filteredInventory.forEach(item => {
                    inventoryUI.innerHTML += `
                        <li class="item-card">
                            <div>
                                <strong>${item.name}</strong><br>
                                <span style="font-size:0.8rem; color:#666;">Code: ${item.barcode}</span>
                            </div>
                            <button class="danger" onclick="deleteItem('${item.id}', 'inventory')">Remove</button>
                        </li>`;
                });
            }

            // 2. Process Purchase History Logs
            purchasedUI.innerHTML = "";
            const filteredPurchases = purchasedLog.filter(item => 
                item.name.toLowerCase().includes(searchQuery) || item.barcode.includes(searchQuery)
            );

            if (filteredPurchases.length === 0) {
                purchasedUI.innerHTML = `<li style="color:#888; font-size:0.9rem; padding: 5px;">No tracking items found inside current db stack.</li>`;
            } else {
                filteredPurchases.forEach(item => {
                    const timeString = new Date(item.loggedAt).toLocaleTimeString();
                    purchasedUI.innerHTML += `
                        <li class="item-card" style="border-left: 4px solid #6f42c1;">
                            <div>
                                <strong>${item.name}</strong><br>
                                <span style="font-size:0.75rem; color:#888;">Logged Instance: ${timeString} | Code: ${item.barcode}</span>
                            </div>
                            <button class="danger" onclick="deleteItem('${item.id}', 'purchased')">Delete</button>
                        </li>`;
                });
            }

            // 3. Re-hydrate Manual Form Selection Menu
            const selectedVal = selectUI.value;
            selectUI.innerHTML = inventoryItems.length === 0 
                ? `<option value="">-- No registered inventory items --</option>`
                : inventoryItems.map(item => `<option value="${item.id}">${item.name} (${item.barcode})</option>`).join('');
            if (selectedVal) selectUI.value = selectedVal;
        }

        // Initialize display configuration on DOM layout assembly completion
        document.addEventListener("DOMContentLoaded", loadDataFromBackend);
    </script>
</body>

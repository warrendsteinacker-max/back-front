<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Wireless Controller</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        textarea {
            height: 80px;
            resize: vertical;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: background 0.2s;
        }
        .btn-text { background-color: #3498db; }
        .btn-text:hover { background-color: #2980b9; }
        .btn-json { background-color: #2ecc71; }
        .btn-json:hover { background-color: #27ae60; }
        .btn-test { background-color: #e67e22; grid-column: span 2; }
        .btn-test:hover { background-color: #d35400; }
        #log {
            margin-top: 20px;
            padding: 12px;
            background: #2c3e50;
            color: #ecf0f1;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Wireless Server Controller</h2>
    
    <div class="form-group">
        <label for="serverIp">Server URL:</label>
        <input type="text" id="serverIp" value="http://100.103.196.73:3000">
    </div>

    <div class="form-group">
        <label for="messageData">Message Payload:</label>
        <textarea id="messageData" placeholder="Type text here, or custom JSON..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn-test" onclick="testConnection()">1. Test GET Connection</button>
        <button class="btn-text" onclick="sendData('text')">2. Send as TEXT</button>
        <button class="btn-json" onclick="sendData('json')">3. Send as JSON</button>
    </div>

    <div id="log">Status: Ready to link...</div>
</div>

<script>
    const logDiv = document.getElementById('log');

    function updateLog(message, isError = false) {
        logDiv.innerText = message;
        logDiv.style.backgroundColor = isError ? '#c0392b' : '#2c3e50';
    }

    // 1. GET Handshake
    async function testConnection() {
        const baseUrl = document.getElementById('serverIp').value.trim();
        updateLog("Testing connection...");
        
        try {
            const response = await fetch(`${baseUrl}/`);
            const text = await response.text();
            updateLog(`Server Response:\n${text}`);
        } catch (error) {
            updateLog(`Connection Failed!\nError: ${error.message}`, true);
        }
    }

    // 2 & 3. POST Handshake
    async function sendData(type) {
        const baseUrl = document.getElementById('serverIp').value.trim();
        const rawPayload = document.getElementById('messageData').value;
        
        let headers = {};
        let bodyContent = rawPayload;

        if (type === 'json') {
            headers['Content-Type'] = 'application/json';
            if (!rawPayload.trim()) {
                bodyContent = JSON.stringify({ message: "Hello from wireless interface!" });
                document.getElementById('messageData').value = bodyContent;
            } else {
                try {
                    JSON.parse(rawPayload);
                } catch(e) {
                    updateLog("Error: Input is not valid JSON!", true);
                    return;
                }
            }
        } else {
            headers['Content-Type'] = 'text/plain';
            if (!rawPayload.trim()) bodyContent = "Raw wireless stream string.";
        }

        updateLog(`Transmitting ${type.toUpperCase()}...`);

        try {
            const response = await fetch(`${baseUrl}/data`, {
                method: 'POST',
                headers: headers,
                body: bodyContent
            });
            const result = await response.json();
            updateLog(`Server Response:\n${JSON.stringify(result, null, 2)}`);
        } catch (error) {
            updateLog(`Transmission Failed!\nError: ${error.message}`, true);
        }
    }
</script>

</body>
</html>
